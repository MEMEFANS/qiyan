<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>专家简介 - 启言儿童健康咨询中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      body { font-family: 'Plus Jakarta Sans', sans-serif; }
      .bg-grid { background-image: radial-gradient(circle at 1px 1px, #e2e8f0 1px, transparent 0); background-size: 40px 40px; }
      .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
      .shadow-soft { box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.05); }
      .gradient-text { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
  </head>
  <body class="bg-slate-50 min-h-screen selection:bg-brand-100 selection:text-brand-900">
    <!-- Navbar -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-white/60 backdrop-blur-xl border-b border-white/20">
      <div class="mx-auto max-w-7xl px-6 py-4 flex items-center justify-between">
        <a href="/" class="flex items-center gap-3 group">
          <div class="h-11 w-11 bg-slate-900 rounded-2xl flex items-center justify-center text-white group-hover:bg-brand-500 transition-all duration-500 rotate-3 group-hover:rotate-0 shadow-lg">
            <i data-lucide="sparkles" class="h-6 w-6"></i>
          </div>
          <div class="flex flex-col">
            <span class="text-lg font-black text-slate-900 leading-none tracking-tight">启言中心</span>
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Professional Care</span>
          </div>
        </a>
        <div class="flex items-center gap-4">
          <a href="/experts.html" class="px-5 py-2.5 bg-white text-slate-600 text-xs font-bold rounded-xl border border-slate-100 hover:bg-slate-50 hover:text-slate-900 transition-all flex items-center gap-2 shadow-sm">
            <i data-lucide="arrow-left" class="h-4 w-4"></i>
            返回团队
          </a>
        </div>
      </div>
    </nav>

    <main id="expertDetail" class="pt-32 pb-24 relative overflow-hidden">
      <!-- Background Elements -->
      <div class="absolute top-0 left-0 w-full h-[600px] bg-grid opacity-40 -z-10"></div>
      <div class="absolute top-40 right-[-100px] w-96 h-96 bg-brand-200/30 rounded-full blur-[100px] -z-10 animate-pulse"></div>
      <div class="absolute bottom-20 left-[-100px] w-96 h-96 bg-accent-200/20 rounded-full blur-[100px] -z-10"></div>

      <div class="mx-auto max-w-6xl px-6">
        <!-- Loading State -->
        <div id="loading" class="flex flex-col items-center justify-center py-40">
          <div class="h-16 w-16 border-4 border-slate-200 border-t-brand-500 rounded-full animate-spin"></div>
          <p class="mt-6 text-slate-400 font-bold animate-pulse">正在获取专家深度资料...</p>
        </div>

        <!-- Content Area (Hidden by default) -->
        <div id="content" class="hidden opacity-0 transition-opacity duration-1000">
          <div class="grid lg:grid-cols-12 gap-12 items-start">
            <!-- Left: Avatar Card -->
            <div class="lg:col-span-5 sticky top-32">
              <div class="relative group">
                <div class="absolute -inset-4 bg-white/40 rounded-[3rem] blur-2xl opacity-0 group-hover:opacity-100 transition-opacity duration-700"></div>
                <div class="relative rounded-[3rem] overflow-hidden bg-white p-4 shadow-soft border border-white">
                  <div class="aspect-[3/4] rounded-[2.2rem] overflow-hidden bg-slate-100 border-4 border-slate-50 relative">
                    <img id="expertImg" src="" alt="" class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110">
                    <div class="absolute inset-0 bg-gradient-to-t from-slate-900/40 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                  </div>
                  
                  <!-- Stat Badges -->
                  <div class="grid grid-cols-2 gap-4 mt-6">
                    <div class="bg-slate-50 rounded-2xl p-4 text-center border border-slate-100/50">
                      <div class="text-xs font-bold text-slate-400 mb-1">从业经验</div>
                      <div class="text-xl font-black text-slate-900">10+ 年</div>
                    </div>
                    <div class="bg-slate-50 rounded-2xl p-4 text-center border border-slate-100/50">
                      <div class="text-xs font-bold text-slate-400 mb-1">康复案例</div>
                      <div class="text-xl font-black text-slate-900">500+ 例</div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Right: Information -->
            <div class="lg:col-span-7 pt-4">
              <div class="space-y-8">
                <div>
                  <div id="expertTitleTag" class="inline-flex items-center gap-2 px-4 py-2 bg-brand-50 text-brand-600 text-[10px] font-black rounded-full mb-6 ring-1 ring-brand-100 shadow-sm">
                    <i data-lucide="award" class="h-3.5 w-3.5"></i>
                    <span id="expertTitle"></span>
                  </div>
                  <h1 id="expertName" class="text-5xl lg:text-6xl font-black text-slate-900 mb-6 tracking-tight"></h1>
                  <p id="expertSpecialty" class="text-xl font-bold text-slate-400 leading-relaxed"></p>
                </div>

                <!-- Bio Card -->
                <div class="glass-card rounded-[2.5rem] p-8 lg:p-10 shadow-soft relative overflow-hidden group">
                  <div class="absolute top-0 right-0 p-8 opacity-[0.03] group-hover:scale-125 transition-transform duration-700">
                    <i data-lucide="quote" class="h-32 w-32"></i>
                  </div>
                  
                  <div class="flex items-center gap-3 mb-8">
                    <div class="h-10 w-10 bg-brand-500 rounded-xl flex items-center justify-center text-white shadow-lg shadow-brand-200">
                      <i data-lucide="file-text" class="h-5 w-5"></i>
                    </div>
                    <h3 class="text-lg font-black text-slate-900 tracking-tight">专家简介</h3>
                  </div>
                  
                  <div id="expertBio" class="text-slate-600 leading-[1.8] text-base space-y-4 whitespace-pre-wrap"></div>
                </div>

                <!-- Features -->
                <div class="grid md:grid-cols-2 gap-6">
                  <div class="p-8 bg-white rounded-3xl border border-slate-100 shadow-sm hover:shadow-md transition-shadow">
                    <div class="h-10 w-10 bg-accent-50 rounded-xl flex items-center justify-center text-accent-600 mb-6">
                      <i data-lucide="target" class="h-5 w-5"></i>
                    </div>
                    <h4 class="text-base font-black text-slate-900 mb-3">干预理念</h4>
                    <p class="text-sm text-slate-500 leading-relaxed">坚持循证医学导向，结合数字化评估系统，为每个孩子制定高度个性化的康复方案。</p>
                  </div>
                  <div class="p-8 bg-white rounded-3xl border border-slate-100 shadow-sm hover:shadow-md transition-shadow">
                    <div class="h-10 w-10 bg-green-50 rounded-xl flex items-center justify-center text-green-600 mb-6">
                      <i data-lucide="heart" class="h-5 w-5"></i>
                    </div>
                    <h4 class="text-base font-black text-slate-900 mb-3">家长口碑</h4>
                    <p class="text-sm text-slate-500 leading-relaxed">深受家长信赖，以专业、耐心和显著的康复效果赢得了广泛的社会赞誉。</p>
                  </div>
                </div>

                <!-- Call to Action -->
                <div class="pt-8 flex flex-col sm:flex-row gap-4">
                  <a href="/index.html#booking" class="flex-1 px-8 py-5 bg-slate-900 text-white font-bold rounded-2xl hover:bg-brand-500 transition-all shadow-xl hover:shadow-brand-200 flex items-center justify-center gap-3 group active:scale-[0.98]">
                    <i data-lucide="calendar" class="h-5 w-5 group-hover:animate-bounce"></i>
                    预约专家咨询
                  </a>
                  <button onclick="window.print()" class="px-8 py-5 bg-white text-slate-600 font-bold rounded-2xl border border-slate-200 hover:bg-slate-50 transition-all flex items-center justify-center gap-3 active:scale-[0.98]">
                    <i data-lucide="download" class="h-5 w-5"></i>
                    保存资料
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <div id="siteFooter"></div>

    <script src="./admin/content-loader.js"></script>
    <script src="./layout.js"></script>
    <script>
      async function loadExpertDetail() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const loading = document.getElementById('loading');
        const content = document.getElementById('content');

        try {
          const res = await fetch('/api/experts?t=' + Date.now());
          const experts = await res.json();
          const expert = experts.find(e => e.id === id);

          if (!expert) {
            loading.innerHTML = `
              <div class="text-center">
                <i data-lucide="alert-circle" class="h-16 w-16 text-slate-200 mx-auto mb-6"></i>
                <p class="text-slate-400 font-bold">抱歉，未找到该专家的详细资料</p>
                <a href="/experts.html" class="mt-8 inline-block text-brand-500 font-bold border-b-2 border-brand-500">返回团队列表</a>
              </div>
            `;
            lucide.createIcons();
            return;
          }

          // Fill Content
          document.getElementById('expertImg').src = expert.image || 'https://images.unsplash.com/photo-1559839734-2b71f1536783?w=800';
          document.getElementById('expertName').textContent = expert.name;
          document.getElementById('expertTitle').textContent = expert.title;
          document.getElementById('expertSpecialty').textContent = expert.specialty;
          document.getElementById('expertBio').textContent = expert.bio;
          
          document.title = `${expert.name} - 专家简介 - 启言儿童健康咨询中心`;

          // Show content with animation
          loading.classList.add('hidden');
          content.classList.remove('hidden');
          setTimeout(() => {
            content.classList.add('opacity-100');
          }, 50);

          lucide.createIcons();
        } catch (e) {
          loading.innerHTML = '<p class="text-red-400 font-bold">加载失败，请检查网络后重试</p>';
        }
      }
      loadExpertDetail();
    </script>
  </body>
</html>
