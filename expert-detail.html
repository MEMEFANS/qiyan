<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>专家简介 - 启言儿童健康咨询中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      body { font-family: 'Plus Jakarta Sans', sans-serif; }
      .shadow-card { shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05); }
    </style>
  </head>
  <body class="bg-slate-50">
    <nav class="fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-100">
      <div class="mx-auto max-w-7xl px-6 py-4 flex items-center justify-between">
        <a href="/" class="flex items-center gap-2">
          <div class="h-10 w-10 bg-brand-500 rounded-xl flex items-center justify-center text-white">
            <i data-lucide="sparkles" class="h-6 w-6"></i>
          </div>
          <span class="text-xl font-black text-slate-900 tracking-tight">启言中心</span>
        </a>
        <a href="/experts.html" class="px-6 py-2.5 bg-slate-900 text-white text-xs font-bold rounded-full hover:bg-brand-500 transition-all">返回团队</a>
      </div>
    </nav>

    <main class="pt-32 pb-24">
      <div class="mx-auto max-w-4xl px-6">
        <div id="expertDetail" class="bg-white rounded-[3rem] p-12 shadow-card border border-slate-100">
            <div class="flex justify-center py-20">
                <i data-lucide="loader-2" class="h-8 w-8 text-brand-500 animate-spin"></i>
            </div>
        </div>
      </div>
    </main>

    <script>
      async function loadExpertDetail() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const container = document.getElementById('expertDetail');

        try {
          const res = await fetch('/api/experts');
          const experts = await res.json();
          const expert = experts.find(e => e.id === id);

          if (!expert) {
            container.innerHTML = '<div class="text-center py-20">未找到该专家信息</div>';
            return;
          }

          container.innerHTML = `
            <div class="grid md:grid-cols-12 gap-12 items-start">
              <div class="md:col-span-5">
                <div class="aspect-[3/4] rounded-[2.5rem] overflow-hidden bg-slate-100 border-8 border-slate-50">
                  <img src="${expert.image}" class="w-full h-full object-cover">
                </div>
              </div>
              <div class="md:col-span-7">
                <div class="inline-block px-4 py-1.5 bg-brand-50 text-brand-600 text-[10px] font-extrabold rounded-full mb-6">${expert.title}</div>
                <h1 class="text-4xl font-black text-slate-900 mb-4">${expert.name}</h1>
                <p class="text-lg font-bold text-slate-400 mb-8">${expert.specialty}</p>
                <div class="space-y-6 text-slate-600 leading-relaxed">
                  <div class="h-px bg-slate-100 w-20"></div>
                  <h4 class="text-xs font-black text-slate-900 uppercase tracking-widest">专家简介</h4>
                  <p class="whitespace-pre-wrap">${expert.bio}</p>
                </div>
                <div class="mt-12 flex gap-4">
                    <a href="/index.html#booking" class="px-8 py-4 bg-brand-500 text-white font-bold rounded-2xl hover:bg-brand-600 transition-all shadow-soft active:scale-95 flex items-center gap-2">
                        <i data-lucide="calendar" class="h-5 w-5"></i>
                        立即预约咨询
                    </a>
                </div>
              </div>
            </div>
          `;
          lucide.createIcons();
        } catch (e) {
          container.innerHTML = '<div class="text-center py-20">加载失败</div>';
        }
      }
      loadExpertDetail();
    </script>
  </body>
</html>
