<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="中心全景｜启言社交训练中心" />
    <title>中心全景｜启言社交训练中心</title>

    <link rel="icon" href="/assets/logo.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide/dist/umd/lucide.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
            },
            colors: {
              brand: {
                50: "#fff7ed",
                100: "#ffedd5",
                200: "#fed7aa",
                300: "#fdba74",
                400: "#fb923c",
                500: "#f97316",
                600: "#ea580c",
                700: "#c2410c",
                800: "#9a3412",
                900: "#7c2d12",
              },
              accent: {
                50: "#f0f9ff",
                100: "#e0f2fe",
                200: "#bae6fd",
                300: "#7dd3fc",
                400: "#38bdf8",
                500: "#0ea5e9",
                600: "#0284c7",
                700: "#0369a1",
                800: "#075985",
                900: "#0c4a6e",
              }
            },
            boxShadow: {
              soft: "0 10px 30px rgba(249, 115, 22, 0.08)",
              card: "0 10px 20px rgba(15, 23, 42, 0.04)",
              hover: "0 20px 40px rgba(249, 115, 22, 0.12)",
            },
            borderRadius: {
              '4xl': '2rem',
              '5xl': '2.5rem',
            }
          }
        }
      };
    </script>
    <style>
      :root { color-scheme: light; }
      html { scroll-behavior: smooth; }
      body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    </style>
  </head>

  <body class="bg-white text-slate-900">
    <a href="#content" class="sr-only focus:not-sr-only focus:absolute focus:top-3 focus:left-3 focus:z-50 focus:rounded-lg focus:bg-white focus:px-4 focus:py-2 focus:shadow">跳到正文</a>

    <div id="siteHeader"></div>

    <main id="content">
      <!-- Hero Section -->
      <section class="relative bg-white pt-20 pb-24 overflow-hidden">
        <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-[0.03]"></div>
        <div class="mx-auto max-w-7xl px-6 relative">
          <nav class="flex items-center gap-2 text-sm font-medium text-slate-400 mb-8">
            <a href="./index.html" class="hover:text-brand-500 transition-colors">网站首页</a>
            <i data-lucide="chevron-right" class="h-3.5 w-3.5"></i>
            <a href="./about.html" class="hover:text-brand-500 transition-colors">关于启言</a>
            <i data-lucide="chevron-right" class="h-3.5 w-3.5"></i>
            <span class="text-slate-900">中心全景</span>
          </nav>
          
          <div class="max-w-3xl">
            <h1 class="text-4xl font-extrabold tracking-tight text-slate-900 sm:text-5xl lg:text-6xl">
              中心全景
            </h1>
            <p class="mt-6 text-xl leading-relaxed text-slate-600 font-medium">
              打造沉浸式专业康复空间，为孩子的成长提供安全、舒适、高效的学习环境。
            </p>
          </div>
        </div>
      </section>

      <section class="mx-auto max-w-7xl px-6 py-12 md:py-20">
        <div class="rounded-3xl border border-slate-100 bg-slate-50 p-8 shadow-card overflow-hidden">
          <div class="flex items-center gap-3 mb-6">
            <div class="p-2 bg-brand-100 text-brand-600 rounded-lg">
              <i data-lucide="camera" class="h-5 w-5"></i>
            </div>
            <h2 class="text-xl font-bold text-slate-900">全景 / 相册</h2>
          </div>
          <p class="text-slate-600 mb-8">这里展示中心的真实环境、VR全景导览以及各功能区的实拍照片。</p>
          
          <div class="aspect-video w-full rounded-2xl border border-slate-200 bg-white shadow-sm flex items-center justify-center">
            <div class="text-center">
              <i data-lucide="image" class="h-12 w-12 text-slate-200 mx-auto mb-4"></i>
              <div class="text-sm font-semibold text-slate-900">全景占位区域</div>
              <div class="mt-1 text-xs text-slate-500">即将替换为 720° VR 全景</div>
            </div>
          </div>
        </div>

        <div class="mt-12 grid gap-6 md:grid-cols-3">
          <div class="group rounded-3xl border border-slate-100 bg-white p-8 shadow-card hover:shadow-hover transition-all duration-300">
            <h3 class="text-lg font-bold text-slate-900 mb-3">感统训练室</h3>
            <p class="text-sm text-slate-600 leading-relaxed">配备进口大运动器材，通过丰富的感官刺激，提升孩子的身体协调性与前庭觉平衡。</p>
          </div>
          <div class="group rounded-3xl border border-slate-100 bg-white p-8 shadow-card hover:shadow-hover transition-all duration-300">
            <h3 class="text-lg font-bold text-slate-900 mb-3">一对一评估室</h3>
            <p class="text-sm text-slate-600 leading-relaxed">安静独立的专业评估空间，采用国际标准化工具，精准捕捉孩子的每一项发展细节。</p>
          </div>
          <div class="group rounded-3xl border border-slate-100 bg-white p-8 shadow-card hover:shadow-hover transition-all duration-300">
            <h3 class="text-lg font-bold text-slate-900 mb-3">社交小组教室</h3>
            <p class="text-sm text-slate-600 leading-relaxed">模拟幼儿园真实课堂，通过情境化的互动设置，培养孩子的规则意识与同伴协作能力。</p>
          </div>
        </div>
      </section>
    </main>

    <div id="siteFooter"></div>

    <script src="./layout.js"></script>
    <script src="./main.js"></script>
    <script>
      // Initialize Lucide icons
      lucide.createIcons();
    </script>
  </body>
</html>
