<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>后台登录 - 启言社交训练中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: "#fff7ed",
                100: "#ffedd5",
                200: "#fed7aa",
                300: "#fdba74",
                400: "#fb923c",
                500: "#f97316",
                600: "#ea580c",
                700: "#c2410c",
                800: "#9a3412",
                900: "#7c2d12",
              },
              accent: {
                50: "#f0f9ff",
                100: "#e0f2fe",
                200: "#bae6fd",
                300: "#7dd3fc",
                400: "#38bdf8",
                500: "#0ea5e9",
                600: "#0284c7",
                700: "#0369a1",
                800: "#075985",
                900: "#0c4a6e",
              }
            }
          }
        }
      }
    </script>
  </head>
  <body class="min-h-screen bg-gradient-to-br from-brand-50 to-brand-100 flex items-center justify-center p-4">
    <div class="w-full max-w-md">
      <div class="bg-white rounded-3xl shadow-2xl p-8">
        <div class="text-center mb-8">
          <div class="mx-auto h-16 w-16 rounded-2xl bg-gradient-to-br from-brand-400 to-brand-600 flex items-center justify-center mb-4">
            <i data-lucide="shield" class="h-8 w-8 text-white"></i>
          </div>
          <h1 class="text-2xl font-bold text-slate-900">后台管理系统</h1>
          <p class="mt-2 text-slate-600">启言社交训练中心</p>
        </div>

        <form id="loginForm" class="space-y-4">
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">用户名</label>
            <input type="text" id="username" class="w-full rounded-xl border border-slate-200 px-4 py-3 text-slate-900 outline-none focus:border-brand-400 focus:ring-4 focus:ring-brand-100" placeholder="请输入用户名" required />
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">密码</label>
            <input type="password" id="password" class="w-full rounded-xl border border-slate-200 px-4 py-3 text-slate-900 outline-none focus:border-brand-400 focus:ring-4 focus:ring-brand-100" placeholder="请输入密码" required />
          </div>
          <div id="error" class="hidden rounded-xl bg-red-50 px-4 py-3 text-sm text-red-600"></div>
          <button type="submit" class="w-full rounded-xl bg-brand-600 px-4 py-3 text-sm font-semibold text-white shadow-lg hover:bg-brand-700 transition-all duration-300">
            登录
          </button>
        </form>

        <div class="mt-6 text-center text-xs text-slate-500">
          默认账号：admin / 密码：admin123
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/lucide/dist/umd/lucide.js"></script>
    <script>
      // Initialize Lucide icons
      lucide.createIcons();

      const loginForm = document.getElementById('loginForm');
      const errorDiv = document.getElementById('error');

      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        try {
          const res = await fetch('/api/login', {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
          });
          const data = await res.json();

          if (data.success) {
            localStorage.setItem('adminLoggedIn', 'true');
            localStorage.setItem('adminUsername', username);
            window.location.href = './dashboard.html';
          } else {
            errorDiv.textContent = data.message || '用户名或密码错误';
            errorDiv.classList.remove('hidden');
          }
        } catch (err) {
          console.error('Login error:', err);
          errorDiv.textContent = '登录请求失败: ' + (err.message || '请检查网络连接');
          errorDiv.classList.remove('hidden');
        }
      });

      // 检查是否已登录
      if (localStorage.getItem('adminLoggedIn') === 'true') {
        window.location.href = './dashboard.html';
      }
    </script>
  </body>
</html>
