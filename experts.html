<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="启言专家｜启言社交训练中心" />
    <title>启言专家｜启言社交训练中心</title>

    <link rel="icon" href="/assets/logo.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide/dist/umd/lucide.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
            },
            colors: {
              brand: {
                50: "#fff7ed",
                100: "#ffedd5",
                200: "#fed7aa",
                300: "#fdba74",
                400: "#fb923c",
                500: "#f97316",
                600: "#ea580c",
                700: "#c2410c",
                800: "#9a3412",
                900: "#7c2d12",
              },
              accent: {
                50: "#f0f9ff",
                100: "#e0f2fe",
                200: "#bae6fd",
                300: "#7dd3fc",
                400: "#38bdf8",
                500: "#0ea5e9",
                600: "#0284c7",
                700: "#0369a1",
                800: "#075985",
                900: "#0c4a6e",
              }
            },
            boxShadow: {
              soft: "0 10px 30px rgba(249, 115, 22, 0.08)",
              card: "0 10px 20px rgba(15, 23, 42, 0.04)",
              hover: "0 20px 40px rgba(249, 115, 22, 0.12)",
            },
            borderRadius: {
              '4xl': '2rem',
              '5xl': '2.5rem',
            }
          }
        }
      }
    </script>
    <style>
      :root { color-scheme: light; }
      html { scroll-behavior: smooth; }
      .glass-effect {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      [data-aos] {
        opacity: 0;
        transform: translateY(20px);
        transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      }
      [data-aos].aos-animate {
        opacity: 1;
        transform: translateY(0);
      }
    </style>
  </head>

  <body class="bg-white text-slate-900">
    <a href="#content" class="sr-only focus:not-sr-only focus:absolute focus:top-3 focus:left-3 focus:z-50 focus:rounded-lg focus:bg-white focus:px-4 focus:py-2 focus:shadow">
      跳到正文
    </a>

    <div id="siteHeader"></div>

    <main id="content">
      <section class="relative bg-white pt-20 pb-24 overflow-hidden">
        <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-[0.03]"></div>
        <div class="mx-auto max-w-7xl px-6 relative text-center">
          <nav class="flex items-center justify-center gap-2 text-sm font-medium text-slate-400 mb-6">
            <a href="./index.html" class="hover:text-brand-500 transition-colors">网站首页</a>
            <i data-lucide="chevron-right" class="h-3.5 w-3.5"></i>
            <span class="text-slate-900">专家团队</span>
          </nav>
          <h1 class="text-4xl font-extrabold tracking-tight text-slate-900 sm:text-5xl lg:text-6xl">
            <span data-content="expertsHeroTitle1">汇聚多学科专家，</span><span class="text-brand-500" data-content="expertsHeroTitle2">护航孩子成长</span>
          </h1>
          <p data-content="expertsHeroSubtitle" class="mt-8 text-lg leading-relaxed text-slate-600 max-w-2xl mx-auto">
            我们的专家团队拥有丰富的临床经验，通过跨学科协作，为每一个孩子制定个性化的康复方案。
          </p>
        </div>
      </section>

      <section class="py-24 bg-slate-50 relative">
        <div class="mx-auto max-w-7xl px-6">
          <!-- Filter Tabs -->
          <div class="flex flex-wrap justify-center gap-4 mb-16">
            <button class="px-6 py-2 rounded-full bg-brand-500 text-white font-bold text-sm shadow-soft">全部专家</button>
            <button class="px-6 py-2 rounded-full bg-white text-slate-600 font-bold text-sm hover:text-brand-500 transition-all shadow-sm">言语治疗 (SLT)</button>
            <button class="px-6 py-2 rounded-full bg-white text-slate-600 font-bold text-sm hover:text-brand-500 transition-all shadow-sm">社交沟通</button>
            <button class="px-6 py-2 rounded-full bg-white text-slate-600 font-bold text-sm hover:text-brand-500 transition-all shadow-sm">作业治疗 (OT)</button>
            <button class="px-6 py-2 rounded-full bg-white text-slate-600 font-bold text-sm hover:text-brand-500 transition-all shadow-sm">心理咨询</button>
          </div>

          <div id="expertsContainer" class="grid gap-12 md:grid-cols-2 lg:grid-cols-3">
            <!-- Experts will be loaded here -->
            <div class="col-span-full flex justify-center py-20">
              <i data-lucide="loader-2" class="h-8 w-8 text-brand-500 animate-spin"></i>
            </div>
          </div>

          <script>
            async function loadExperts() {
              const container = document.getElementById('expertsContainer');
              try {
                const res = await fetch('/api/experts');
                if (!res.ok) throw new Error('Failed to fetch');
                const experts = await res.json();
                
                if (experts.length === 0) {
                  container.innerHTML = '<div class="col-span-full text-center py-20 text-slate-400 font-bold">暂无专家信息</div>';
                  return;
                }

                container.innerHTML = experts.map(e => `
                  <div class="group relative flex flex-col bg-white rounded-[3rem] p-4 shadow-card hover:shadow-hover transition-all duration-500 hover:-translate-y-2 border border-slate-50">
                    <div class="relative aspect-[3/4] overflow-hidden rounded-[2.5rem] bg-slate-100 mb-8">
                      <img src="${e.image || 'https://images.unsplash.com/photo-1559839734-2b71f1536783?w=800'}" alt="${e.name}" class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                      <div class="absolute inset-0 bg-gradient-to-t from-slate-900/60 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                    </div>
                    <div class="px-6 pb-8 text-center">
                      <div class="inline-block px-4 py-1.5 bg-brand-50 text-brand-600 text-[10px] font-extrabold rounded-full mb-4 group-hover:bg-brand-500 group-hover:text-white transition-colors duration-300">
                        ${e.title}
                      </div>
                      <h3 class="text-2xl font-black text-slate-900 mb-3">${e.name}</h3>
                      <p class="text-slate-500 text-xs font-bold leading-relaxed mb-6 line-clamp-2">${e.specialty}</p>
                      <div class="pt-6 border-t border-slate-50">
                        <a href="/expert-detail.html?id=${e.id}" class="inline-flex items-center gap-2 text-slate-900 text-xs font-black group-hover:text-brand-500 transition-colors">
                          查看专家简介
                          <div class="h-8 w-8 rounded-full bg-slate-50 flex items-center justify-center group-hover:bg-brand-500 group-hover:text-white transition-all duration-300">
                            <i data-lucide="arrow-right" class="h-4 w-4"></i>
                          </div>
                        </a>
                      </div>
                    </div>
                  </div>
                `).join('');
                lucide.createIcons();
              } catch (e) {
                container.innerHTML = '<div class="col-span-full text-center py-20 text-red-400 font-bold">加载失败，请刷新重试</div>';
              }
            }
            loadExperts();
          </script>
          
          <!-- Dynamic Expert List -->
          <div id="dynamicExpertList" class="mt-10 grid gap-10 md:grid-cols-2 lg:grid-cols-3"></div>

          <!-- Pagination -->
          <div class="mt-20 flex justify-center items-center gap-4">
            <button class="h-10 w-10 flex items-center justify-center rounded-xl border border-slate-200 text-slate-400 hover:border-brand-500 hover:text-brand-500 transition-all bg-white shadow-sm">
              <i data-lucide="chevron-left" class="h-5 w-5"></i>
            </button>
            <button class="h-10 w-10 flex items-center justify-center rounded-xl bg-brand-500 text-white font-bold shadow-soft">1</button>
            <button class="h-10 w-10 flex items-center justify-center rounded-xl border border-slate-200 text-slate-600 hover:border-brand-500 hover:text-brand-500 transition-all font-bold bg-white shadow-sm">2</button>
            <button class="h-10 w-10 flex items-center justify-center rounded-xl border border-slate-200 text-slate-600 hover:border-brand-500 hover:text-brand-500 transition-all font-bold bg-white shadow-sm">3</button>
            <button class="h-10 w-10 flex items-center justify-center rounded-xl border border-slate-200 text-slate-400 hover:border-brand-500 hover:text-brand-500 transition-all bg-white shadow-sm">
              <i data-lucide="chevron-right" class="h-5 w-5"></i>
            </button>
          </div>
        </div>
      </section>

      <!-- CTA -->
      <section class="py-24 bg-white">
        <div class="mx-auto max-w-7xl px-6">
          <div class="relative overflow-hidden rounded-4xl bg-brand-500 px-8 py-16 shadow-2xl sm:px-16 md:py-24">
            <!-- Background Decoration -->
            <div class="absolute top-0 right-0 -mr-20 -mt-20 h-64 w-64 rounded-full bg-brand-400/20 blur-3xl"></div>
            <div class="absolute bottom-0 left-0 -ml-20 -mb-20 h-64 w-64 rounded-full bg-accent-400/20 blur-3xl"></div>
            
            <div class="relative mx-auto max-w-3xl text-center">
              <h2 class="text-3xl font-extrabold tracking-tight text-white sm:text-4xl">
                想了解更多关于专家团队的信息？
              </h2>
              <p class="mt-6 text-lg leading-relaxed text-orange-50">
                我们的每一位专家都经过严格的筛选与培训。如果您不确定哪位专家最适合您的孩子，欢迎预约我们的初步咨询，我们将为您匹配最合适的资源。
              </p>
              <div class="mt-10 flex flex-wrap justify-center gap-4">
                <a href="./contact.html" class="flex h-14 items-center justify-center rounded-2xl bg-white px-8 text-base font-bold text-brand-600 shadow-lg transition-all hover:scale-105 active:scale-95">
                  立即咨询匹配专家
                </a>
                <a href="tel:400-XXX-XXXX" class="flex h-14 items-center justify-center rounded-2xl border-2 border-white/30 px-8 text-base font-bold text-white transition-all hover:bg-white/10">
                  电话咨询
                </a>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="siteFooter"></div>

    <script src="./admin/content-loader.js"></script>
    <script src="./layout.js"></script>
    <script src="./main.js"></script>
    <script>
      // Initialize Lucide icons
      lucide.createIcons();
    </script>
  </body>
</html>
