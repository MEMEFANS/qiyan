    <main id="content">
      <!-- Hero Section -->
      <section class="relative bg-white pt-20 pb-24 overflow-hidden">
        <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-[0.03]"></div>
        <div class="mx-auto max-w-7xl px-6 relative">

          <div class="max-w-3xl">
            <h1 class="text-4xl font-extrabold tracking-tight text-slate-900 sm:text-5xl lg:text-6xl">
              启言概况

            <p class="mt-6 text-xl leading-relaxed text-slate-600 font-medium">

        </div>

          <div class="group rounded-3xl border border-slate-100 bg-white p-8 shadow-card hover:shadow-hover transition-all duration-300">
            <div class="mb-6 inline-flex h-12 w-12 items-center justify-center rounded-2xl bg-brand-50 text-brand-600 group-hover:bg-brand-500 group-hover:text-white transition-colors">

            </div>
            <h3 class="text-xl font-bold text-slate-900 mb-4">定位</h3>
            <p class="text-slate-600 leading-relaxed">

            </p>
          </div>

          <div class="group rounded-3xl border border-slate-100 bg-white p-8 shadow-card hover:shadow-hover transition-all duration-300">
            <div class="mb-6 inline-flex h-12 w-12 items-center justify-center rounded-2xl bg-accent-50 text-accent-600 group-hover:bg-accent-500 group-hover:text-white transition-colors">

            </div>
            <h3 class="text-xl font-bold text-slate-900 mb-4">优势</h3>

              <i data-lucide="refresh-cw" class="h-6 w-6"></i>
            </div>
            <h3 class="text-xl font-bold text-slate-900 mb-4">流程</h3>
            <p class="text-slate-600 leading-relaxed">
