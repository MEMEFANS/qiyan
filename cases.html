<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="康复案例｜启言社交训练中心" />
    <title>康复案例｜启言社交训练中心</title>

    <link rel="icon" href="/assets/logo.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide/dist/umd/lucide.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
            },
            colors: {
              brand: {
                50: "#fff7ed",
                100: "#ffedd5",
                200: "#fed7aa",
                300: "#fdba74",
                400: "#fb923c",
                500: "#f97316",
                600: "#ea580c",
                700: "#c2410c",
                800: "#9a3412",
                900: "#7c2d12",
              },
              accent: {
                50: "#f0f9ff",
                100: "#e0f2fe",
                200: "#bae6fd",
                300: "#7dd3fc",
                400: "#38bdf8",
                500: "#0ea5e9",
                600: "#0284c7",
                700: "#0369a1",
                800: "#075985",
                900: "#0c4a6e",
              }
            },
            boxShadow: {
              soft: "0 10px 30px rgba(249, 115, 22, 0.08)",
              card: "0 10px 20px rgba(15, 23, 42, 0.04)",
              hover: "0 20px 40px rgba(249, 115, 22, 0.12)",
            },
            borderRadius: {
              '4xl': '2rem',
              '5xl': '2.5rem',
            }
          }
        }
      };
    </script>
    <style>
      :root { color-scheme: light; }
      html { scroll-behavior: smooth; }
      body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    </style>
  </head>

  <body class="bg-white text-slate-900">
    <a href="#content" class="sr-only focus:not-sr-only focus:absolute focus:top-3 focus:left-3 focus:z-50 focus:rounded-lg focus:bg-white focus:px-4 focus:py-2 focus:shadow">
      跳到正文
    </a>

    <div id="siteHeader"></div>

    <main id="content">
      <section class="relative bg-white pt-20 pb-24 overflow-hidden">
        <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-[0.03]"></div>
        <div class="mx-auto max-w-7xl px-6 relative text-center">
          <nav class="flex items-center justify-center gap-2 text-sm font-medium text-slate-400 mb-6">
            <a href="./index.html" class="hover:text-brand-500 transition-colors">网站首页</a>
            <i data-lucide="chevron-right" class="h-3.5 w-3.5"></i>
            <span class="text-slate-900">康复案例</span>
          </nav>
          <h1 class="text-4xl font-extrabold tracking-tight text-slate-900 sm:text-5xl lg:text-6xl">
            <span data-content="casesHeroTitle1">见证成长的</span><span class="text-brand-500" data-content="casesHeroTitle2">每一个瞬间</span>
          </h1>
          <p data-content="casesHeroSubtitle" class="mt-8 text-lg leading-relaxed text-slate-600 max-w-2xl mx-auto">
            在这里，我们记录了孩子们通过科学康复训练取得的点滴进步。每一个案例的背后，都是孩子、家长与老师共同努力的成果。
          </p>
        </div>
      </section>

      <section class="py-24 bg-slate-50 relative">
        <div class="mx-auto max-w-7xl px-6">
          <div id="dynamicCaseList" class="grid gap-8 md:grid-cols-2 lg:grid-cols-3">
            <div class="col-span-full flex items-center justify-center py-20">
              <i data-lucide="loader-2" class="h-8 w-8 text-brand-500 animate-spin"></i>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="siteFooter"></div>

    <script src="./layout.js"></script>
    <script src="./main.js"></script>
    <script>
      // Initialize Lucide icons
      lucide.createIcons();

      // Load Dynamic Cases
      async function loadDynamicCases() {
        const container = document.getElementById('dynamicCaseList');
        if (!container) return;

        try {
          const res = await fetch('/api/cases?t=' + Date.now());
          if (!res.ok) {
            container.innerHTML = '<div class="col-span-full text-center py-20 text-slate-400">暂无案例内容</div>';
            return;
          }
          const cases = await res.json();
          
          if (cases && cases.length > 0) {
            container.innerHTML = cases.map(c => `
              <a href="./case-detail.html?id=${c.id}" class="group flex flex-col rounded-[2.5rem] bg-white shadow-card transition-all duration-500 hover:-translate-y-2 hover:shadow-hover border border-slate-100 overflow-hidden">
                <div class="aspect-[16/10] relative overflow-hidden bg-slate-200">
                  <img src="${c.image || 'https://images.unsplash.com/photo-1503454537195-1dcabb73ffb9?w=800'}" alt="${c.title}" class="absolute inset-0 w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" onerror="this.style.display='none'" />
                  <div class="absolute top-4 left-4">
                    <span class="px-3 py-1 bg-brand-500 text-white text-[10px] font-bold rounded-full shadow-soft">${c.category}</span>
                  </div>
                </div>
                <div class="p-8">
                  <h3 class="text-xl font-bold text-slate-900 mb-3 group-hover:text-brand-500 transition-colors">${c.title}</h3>
                  <p class="text-slate-600 text-sm leading-relaxed mb-6 line-clamp-2">${c.description}</p>
                  <div class="pt-6 border-t border-slate-50 flex items-center justify-between text-xs font-bold">
                    <span class="text-slate-400">阅读全文</span>
                    <div class="h-8 w-8 rounded-full bg-slate-50 flex items-center justify-center text-slate-900 group-hover:bg-brand-500 group-hover:text-white transition-all">
                      <i data-lucide="arrow-right" class="h-4 w-4"></i>
                    </div>
                  </div>
                </div>
              </a>
            `).join('');
            lucide.createIcons();
          } else {
            container.innerHTML = '<div class="col-span-full text-center py-20 text-slate-400">暂无案例内容</div>';
          }
        } catch (e) {
          console.error('Failed to load dynamic cases:', e);
          container.innerHTML = '<div class="col-span-full text-center py-20 text-slate-400">加载失败，请刷新重试</div>';
        }
      }

      loadDynamicCases();
    </script>
  </body>
</html>
