<!doctype html>
<html lang="zh-CN">

    <link rel="icon" href="/assets/logo.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <script src="https://cdn.tailwindcss.com"></script>

    <script>

        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
            },
            colors: {
              brand: {

                200: "#fed7aa",
                300: "#fdba74",
                400: "#fb923c",
                500: "#f97316",
                600: "#ea580c",
                700: "#c2410c",
                800: "#9a3412",
                900: "#7c2d12",
              },
              accent: {
                50: "#f0f9ff",
                100: "#e0f2fe",
                200: "#bae6fd",
                300: "#7dd3fc",
                400: "#38bdf8",
                500: "#0ea5e9",
                600: "#0284c7",
                700: "#0369a1",
                800: "#075985",
                900: "#0c4a6e",
              }
            },
            boxShadow: {
              soft: "0 10px 30px rgba(249, 115, 22, 0.08)",
              card: "0 10px 20px rgba(15, 23, 42, 0.04)",
              hover: "0 20px 40px rgba(249, 115, 22, 0.12)",
            },
            borderRadius: {
              '4xl': '2rem',
              '5xl': '2.5rem',

          }
        }
      };

    <style>
      :root { color-scheme: light; }
      html { scroll-behavior: smooth; }

  <body class="bg-white text-slate-900">
    <a href="#content" class="sr-only focus:not-sr-only focus:absolute focus:top-3 focus:left-3 focus:z-50 focus:rounded-lg focus:bg-white focus:px-4 focus:py-2 focus:shadow">
      跳到正文
    </a>

    <div id="siteHeader"></div>

    <main id="content">
      <section class="relative bg-white pt-20 pb-24 overflow-hidden">
        <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-[0.03]"></div>
        <div class="mx-auto max-w-7xl px-6 relative text-center">
          <nav class="flex items-center justify-center gap-2 text-sm font-medium text-slate-400 mb-6">
            <a href="./index.html" class="hover:text-brand-500 transition-colors">网站首页</a>
            <i data-lucide="chevron-right" class="h-3.5 w-3.5"></i>
            <span class="text-slate-900">康复案例</span>
          </nav>
          <h1 class="text-4xl font-extrabold tracking-tight text-slate-900 sm:text-5xl lg:text-6xl">
            <span data-content="casesHeroTitle1">见证成长的</span><span class="text-brand-500" data-content="casesHeroTitle2">每一个瞬间</span>
          </h1>
          <p data-content="casesHeroSubtitle" class="mt-8 text-lg leading-relaxed text-slate-600 max-w-2xl mx-auto">

        <div class="mx-auto max-w-7xl px-6">
          <div class="grid gap-8 md:grid-cols-2 lg:grid-cols-3">
            <!-- Case 1 -->
            <a href="./case-001.html" class="group flex flex-col rounded-[2.5rem] bg-white shadow-card transition-all duration-500 hover:-translate-y-2 hover:shadow-hover border border-slate-100 overflow-hidden">
              <div class="aspect-[16/10] relative overflow-hidden bg-slate-200">
                <div class="absolute inset-0 flex items-center justify-center text-slate-400 group-hover:scale-110 transition-transform duration-500">
                  <i data-lucide="image" class="h-12 w-12 opacity-20"></i>
                </div>
                <img src="https://images.unsplash.com/photo-1587653263995-422546a74569?q=80&w=800&auto=format&fit=crop" alt="言语发育迟缓干预案例" class="absolute inset-0 w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" />
                <div class="absolute top-4 left-4">
                  <span class="px-3 py-1 bg-brand-500 text-white text-[10px] font-bold rounded-full shadow-soft">言语发育</span>
                </div>
              </div>
              <div class="p-8">
                <h3 class="text-xl font-bold text-slate-900 mb-3 group-hover:text-brand-500 transition-colors">言语发育迟缓干预案例</h3>
                <p class="text-slate-600 text-sm leading-relaxed mb-6 line-clamp-2">从2岁半不开口，到4个月后能主动表达需求，见证语言爆发期的华丽转变。</p>
                <div class="pt-6 border-t border-slate-50 flex items-center justify-between text-xs font-bold">
                  <span class="text-slate-400">阅读全文</span>
                  <div class="h-8 w-8 rounded-full bg-slate-50 flex items-center justify-center text-slate-900 group-hover:bg-brand-500 group-hover:text-white transition-all">
                    <i data-lucide="arrow-right" class="h-4 w-4"></i>
                  </div>
                </div>
              </div>
            </a>

            <!-- Case 2 -->
            <a href="./case-002.html" class="group flex flex-col rounded-[2.5rem] bg-white shadow-card transition-all duration-500 hover:-translate-y-2 hover:shadow-hover border border-slate-100 overflow-hidden">
              <div class="aspect-[16/10] relative overflow-hidden bg-slate-200">
                <img src="https://images.unsplash.com/photo-1596464716127-f2a82984de30?q=80&w=800&auto=format&fit=crop" alt="社交沟通障碍融合案例" class="absolute inset-0 w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" />
                <div class="absolute top-4 left-4">
                  <span class="px-3 py-1 bg-accent-500 text-white text-[10px] font-bold rounded-full shadow-soft">社交沟通</span>
                </div>
              </div>
              <div class="p-8">
                <h3 class="text-xl font-bold text-slate-900 mb-3 group-hover:text-accent-500 transition-colors">社交沟通障碍融合案例</h3>
                <p class="text-slate-600 text-sm leading-relaxed mb-6 line-clamp-2">帮助高功能自闭症儿童建立社交规则意识，顺利融入普通幼儿园集体生活。</p>
                <div class="pt-6 border-t border-slate-50 flex items-center justify-between text-xs font-bold">
                  <span class="text-slate-400">阅读全文</span>
                  <div class="h-8 w-8 rounded-full bg-slate-50 flex items-center justify-center text-slate-900 group-hover:bg-accent-500 group-hover:text-white transition-all">
                    <i data-lucide="arrow-right" class="h-4 w-4"></i>
                  </div>
                </div>
              </div>
            </a>

            <!-- Case 3 -->
            <a href="./case-003.html" class="group flex flex-col rounded-[2.5rem] bg-white shadow-card transition-all duration-500 hover:-translate-y-2 hover:shadow-hover border border-slate-100 overflow-hidden">
              <div class="aspect-[16/10] relative overflow-hidden bg-slate-200">
                <div class="absolute inset-0 flex items-center justify-center text-slate-400 group-hover:scale-110 transition-transform duration-500">
                  <i data-lucide="image" class="h-12 w-12 opacity-20"></i>
                </div>
                <img src="https://images.unsplash.com/photo-1543269865-cbf427effbad?q=80&w=800&auto=format&fit=crop" alt="构音障碍纠正案例" class="absolute inset-0 w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" />
                <div class="absolute top-4 left-4">
                  <span class="px-3 py-1 bg-brand-500 text-white text-[10px] font-bold rounded-full shadow-soft">构音纠正</span>
                </div>
              </div>
              <div class="p-8">
                <h3 class="text-xl font-bold text-slate-900 mb-3 group-hover:text-brand-500 transition-colors">构音障碍纠正案例</h3>
                <p class="text-slate-600 text-sm leading-relaxed mb-6 line-clamp-2">针对发音不清问题，通过系统口肌训练与语音泛化，让孩子重拾沟通自信。</p>

                  <div class="h-8 w-8 rounded-full bg-slate-50 flex items-center justify-center text-slate-900 group-hover:bg-brand-500 group-hover:text-white transition-all">
                    <i data-lucide="arrow-right" class="h-4 w-4"></i>
                  </div>
                </div>
              </div>
            </a>
          </div>
        
        <!-- Dynamic Case List -->
        <div id="dynamicCaseList" class="mt-8 grid gap-4 md:grid-cols-3"></div>
      </section>

    <div id="siteFooter"></div>

    <script src="./layout.js"></script>
